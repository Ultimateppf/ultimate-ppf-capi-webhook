[build]
builder = "NIXPACKS"

[deploy]
startCommand = "python -c \"import os,urllib.request,json;at=os.environ.get('NUVEMSHOP_TOKEN','');[urllib.request.urlopen(urllib.request.Request('https://api.tiendanube.com/v1/7647937/webhooks',json.dumps({'url':'https://web-production-f9e966.up.railway.app/webhook/nuvemshop','event':ev}).encode(),{'Authentication':'bearer '+at,'Content-Type':'application/json'},'POST')) for ev in ['order/created','order/paid']]\" 2>&1 || true; gunicorn nuvemshop_whatsapp_capi:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
